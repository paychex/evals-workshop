name: Evals

# Run the evaluation suite on every PR and on pushes to main. A failing gate
# (a metric below its threshold, or a per-example test assertion) fails the
# check and blocks the merge.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a run manually from the Actions tab

jobs:
  evals:
    runs-on: ubuntu-latest
    env:
      # Store these under: repo Settings -> Secrets and variables -> Actions.
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LANGSMITH_PROJECT: evals-ci
      # Required by the langsmith pytest plugin's log_* helpers.
      LANGSMITH_TRACING: "true"
      # Tag experiments with the commit so you can trace a regression to a PR.
      LANGSMITH_EXPERIMENT: ci-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- Per-example gate: granular pass/fail, shows which example broke ---
      - name: Per-example eval tests
        run: pytest module_4_ci/test_evals.py -v --langsmith-output

      # --- Aggregate gate: dataset-level thresholds per metric ---
      - name: Single-turn aggregate gate
        run: python module_4_ci/ci_gate.py --suite single_turn

      - name: Agent aggregate gate
        run: python module_4_ci/ci_gate.py --suite agent
